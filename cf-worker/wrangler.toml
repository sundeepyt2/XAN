# Cloudflare Worker config for XAN stream proxy + AllAnime episode resolver
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "xan-stream-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# v5: No browser binding needed! The Worker implements AllAnime's crypto
# scheme directly using Web Crypto API. Faster, simpler, no browser CPU limits.
#
# v4 used Browser Rendering which:
#   - Was slow (20-40s per request — Chrome cold-start)
#   - Hit Cloudflare's "Just a moment..." challenge on allmanga.to
#   - Was limited to 10 min browser CPU/day on free tier
#
# v5 fetches __aaCrypto from mkissa.to (which has no Cloudflare challenge),
# derives the AES key, signs the GraphQL request, and decrypts the response —
# all in pure Web Crypto. ~1-2s per request, no browser needed.

# Workers don't need a "routes" section — they automatically get a URL at:
#   https://xan-stream-proxy.<your-account-subdomain>.workers.dev
#
# After deploying, copy that URL and set it as NEXT_PUBLIC_CF_WORKER_URL
# in your Vercel project's environment variables.

# ─── No secrets required! ────────────────────────────────────────────────
# No SOLVER_API_KEY, no browser binding, no external service.
# Just `wrangler deploy` and you're done.
