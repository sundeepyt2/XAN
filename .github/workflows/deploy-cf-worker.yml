# .github/workflows/deploy-cf-worker.yml
#
# Auto-deploys the XAN Cloudflare Worker whenever cf-worker/ files change on main.
# No local PC needed — GitHub runs `wrangler deploy` for you.
#
# Setup (one-time, all done in browser):
#   1. Create a Cloudflare API token:
#      - Go to https://dash.cloudflare.com/profile/api-tokens
#      - Click "Create Token" → "Edit Cloudflare Workers" template → "Continue to summary"
#      - Under "Account Resources", select your account
#      - Click "Create Token" → COPY the token (you won't see it again)
#
#   2. Add the token to GitHub as a secret:
#      - Go to https://github.com/<your-username>/XAN/settings/secrets/actions
#      - Click "New repository secret"
#      - Name: CLOUDFLARE_API_TOKEN
#      - Value: paste the token from step 1
#      - Click "Add secret"
#
#   3. Also add your Cloudflare Account ID:
#      - Find it at https://dash.cloudflare.com → right sidebar → "Account ID"
#      - Add another secret: Name: CLOUDFLARE_ACCOUNT_ID, Value: your account ID
#
# After setup, every push to main that touches cf-worker/ triggers a deploy.
# Watch the deploy: https://github.com/<your-username>/XAN/actions

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "cf-worker/**"
      - ".github/workflows/deploy-cf-worker.yml"
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "cf-worker/package-lock.json"

      - name: Install dependencies
        working-directory: cf-worker
        run: npm ci

      - name: Verify wrangler.toml is valid
        working-directory: cf-worker
        run: |
          echo "=== wrangler.toml contents ==="
          cat wrangler.toml
          echo ""
          echo "=== Verifying config (dry-run deploy) ==="
          npx wrangler deploy --dry-run --outdir /tmp/wrangler-out || exit 1
          echo "✅ wrangler.toml is valid"

      - name: Deploy with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cf-worker
          command: deploy
          # Use the wrangler version from package.json (v3 from @cloudflare/puppeteer deps)
          # The pre-installed wrangler 3.x works fine with [browser] syntax

      - name: Verify deployment
        run: |
          echo "✅ Worker deployed successfully"
          echo "🔗 Test URL: https://xan-stream-proxy.<your-subdomain>.workers.dev/"
          echo ""
          echo "Next: visit the URL above in your browser."
          echo "You should see JSON with version: 4 and browserRendering: true"
